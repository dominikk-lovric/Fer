<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Web Shop Layout</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <div class="logo">
          <img src="assets/images/logo.png" height="100%" />
        </div>
        <div class="category-header" id="header_text">
          <p id="header_text"></p>
        </div>
        <div class="header-icons">
          <div class="icon">
            <a href="cart.html"
              ><img src="assets/images/basket.png" class="header-i" id="goCart"
            /></a>
            <div class="circle" id="circpi">
              <img src="assets/images/circl.png" width="50%" height="50%" />
              <div class="circ-text" id="cti">0</div>
            </div>
          </div>
          <div class="icon">
            <img src="assets/images/search.png" height="100%" width="100%" />
          </div>
        </div>
      </div>
      <div class="sidebar" id="categories"></div>
      <div class="info">
        <p class="info_text">Kontakt</p>
        <p class="info_text">Newsletter</p>
        <p class="info_text">Pretplati se</p>
      </div>
      <div class="banner" id="bi">
        <img src="assets/images/store.jpg" class="banner-div" id="bi2" />
        <div class="banner-text">Dobrodošli u najfora dućan na feru😎</div>
      </div>
      <div class="products" id="pw"></div>
    </div>
    <script type="text/javascript" src="scripts/data.js"></script>
    <script type="text/javascript" src="scripts/script.js"></script>
  </body>
</html>
