<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Web Shop Layout</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <div class="logo">
          <img src="assets/images/logo.png" height="100%" />
        </div>
        <div class="category-header">kategorija2</div>
        <div class="header-icons">
          <div class="icon">
            <a href="cart.html"
              ><img src="assets/images/basket.png" height="100%" width="100%"
            /></a>
          </div>
          <div class="icon">
            <img src="assets/images/search.png" height="100%" width="100%" />
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="category">Meso</div>
        <div class="category">Voće</div>
        <div class="category">Povrće</div>
        <div class="category">Grickalice</div>
        <div class="category">Bomboni</div>
        <div class="category">Čokolada</div>
        <div class="category">Pića</div>
        <div class="category">Alkohol</div>
        <div class="category">Pekara</div>
        <div class="category">Čišćenje</div>
      </div>
      <div class="info">
        <p>Kontakt</p>
        <p>Newsletter</p>
        <p>Pretplati se</p>
      </div>
      <div class="banner">
        <img src="assets/images/store.jpg" class="banner-div" />
      </div>
      <div class="products">
        <div class="product">
          <img
            src="assets/images/meat/m1.jpg"
            class="product-img"
            width="80%"
            height="90%"
          />
          <p>Riba</p>
        </div>
        <div class="product">
          <img
            src="assets/images/meat/m2.jpg"
            class="product-img"
            width="80%"
            height="90%"
          />
          <p>Odrezak</p>
        </div>
        <div class="product">
          <img
            src="assets/images/meat/m3.jpg"
            class="product-img"
            width="80%"
            height="90%"
          />
          <p>Slanina</p>
        </div>
        <div class="product">
          <img
            src="assets/images/meat/m4.jpg"
            class="product-img"
            width="80%"
            height="90%"
          />
          <p>Hrenovke</p>
        </div>
        <div class="product">
          <img
            src="assets/images/meat/m5.jpg"
            class="product-img"
            width="80%"
            height="90%"
          />
          <p>Piletina</p>
        </div>
      </div>
    </div>
  </body>
</html>
